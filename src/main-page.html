<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todos</title>
  </head>
  <body>
    <h1>Todos</h1>
    <button class="create-proj">Create Project</button>
    <dialog>
      <form action="" class="project-form">
        <p>
          <label for="projectTitle">
            Project Title:
            <input type="text" id="projectTitle" name="projectTitle" />
          </label>
        </p>
        <div>
          <button value="cancel" formmethod="dialog">Cancel</button>
          <button class="confirmProj">Confirm</button>
        </div>
      </form>
    </dialog>
    <dialog>
      <form action="" class="todo-item">
        <p>
          <label for="title"></label>
          Title:
          <input type="text" id="title" name="title" />
        </p>
        <p>
          <label for="dueDate">Due Date: </label>
          <input type="date" id="dueDate" name="dueDate" />
          <input type="submit" />
        </p>
        <p>
          <label for="priority">Priority: </label>
          <input type="text" id="priority" name="priority" />
        </p>
        <p>
          <label for="description">Description: </label>
          <input type="text" id="description" name="description" />
        </p>
        <div>
          <button value="cancel" formmethod="dialog">Cancel</button>
          <button class="confirmTodo">Confirm</button>
        </div>
      </form>
    </dialog>

    <div class="content"></div>
  </body>
</html>
